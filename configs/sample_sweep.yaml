# Sample-size sweep: vary offline_transitions across 4 levels to show the
# identifiability floor as a function of offline data quantity.
# Combined with alpha_conf_sweep [0.0, 2.0] to expose the interaction
# between dataset size and confounding.
cells: [1, 2, 3, 4]
envs:
  - tabular-sepsis-v0
algorithms:
  - cql
  - dqn
behaviours:
  - uniform
  - reward_aligned
seeds: [0, 1, 2]
total_frames: 2000
n_checkpoints_train: 5
n_checkpoints_eval: 5
env_horizons:
  tabular-sepsis-v0: 20
# Default value; overridden by offline_transitions_sweep below.
offline_transitions: 8000
offline_updates: 800
offline_transitions_sweep: [500, 2000, 8000, 32000]
alpha_conf_sweep: [0.0, 2.0]
n_envs: 16
eval_perturbations: false
