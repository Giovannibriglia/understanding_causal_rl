# Smoke-test / CI config: minimal compute for pipeline sanity-checking.
# Should complete in < 5 minutes on a CPU.  total_frames must be divisible by
# the env horizon; 1600 / 20 = 80 episodes for tabular.
# total_runs: 4 cells × 1 env × 3 algos × 3 behaviours × 2 seeds = 72
# wall_time_estimate (n_workers=4): ~17 min
cells: [1, 2, 3, 4]
envs:
  - tabular-sepsis-v0
algorithms:
  - dqn
  - cql
  - a2c
behaviours:
  - uniform
  - reward_aligned
  - reward_misaligned
seeds: [0, 1]
total_frames: 1600
n_checkpoints_train: 10
n_checkpoints_eval: 5
env_horizons:
  tabular-sepsis-v0: 20
offline_transitions: 5000
offline_updates: 500
alpha_conf: 0.0
n_envs: 16
