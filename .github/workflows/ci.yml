name: CI

on:
  push:
  pull_request:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,docs]"
      - name: Lint
        run: |
          ruff check src tests scripts
          black --check src tests scripts
          isort --check-only src tests scripts
      - name: Type check
        run: mypy --strict src/
      - name: Run tests
        run: pytest --cov=src tests/
      - name: Smoke run
        run: |
          python scripts/run_full_matrix.py --config smoke --quick --device cpu --seeds 0
          python scripts/make_all_figures.py --results results/smoke_*/
          test -f outputs/smoke_*/headline_regression_table.csv
          test -f outputs/smoke_*/tabular/identifiability_panel.pdf
      - name: Build docs
        run: |
          python -m sphinx -b html docs docs/_build/html
      - name: Speed benchmark (warn only)
        run: python scripts/benchmark_speed.py --quick || true

  publish-testpypi:
    if: startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Build package
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
      - name: Publish to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: twine upload --repository testpypi dist/*
      - name: Upload paper figures
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: paper-figures-${{ github.ref_name }}
          path: outputs/paper_*/
